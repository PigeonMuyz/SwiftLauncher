name: Build DMG Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to tag_name."
        required: false
        type: string
      draft:
        description: "Create or keep the release as draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG and publish release asset
    runs-on: macos-latest

    env:
      APP_NAME: SwiftLauncher
      SCHEME: SwiftLauncher
      CONFIGURATION: Release
      DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData
      ARCHIVE_ROOT: ${{ runner.temp }}/SwiftLauncherRelease

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${APP_NAME}.xcodeproj" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package DMG
        id: package
        run: |
          set -euo pipefail

          tag="${{ inputs.tag_name }}"
          safe_tag="${tag//\//-}"
          app_path="${DERIVED_DATA_PATH}/Build/Products/${CONFIGURATION}/${APP_NAME}.app"
          stage_dir="${ARCHIVE_ROOT}/stage"
          dmg_path="${ARCHIVE_ROOT}/${APP_NAME}-${safe_tag}.dmg"

          test -d "${app_path}"
          rm -rf "${ARCHIVE_ROOT}"
          mkdir -p "${stage_dir}"
          ditto "${app_path}" "${stage_dir}/${APP_NAME}.app"
          codesign --force --deep --sign - "${stage_dir}/${APP_NAME}.app"

          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "${stage_dir}" \
            -ov \
            -format UDZO \
            "${dmg_path}"

          shasum -a 256 "${dmg_path}" > "${dmg_path}.sha256"
          echo "dmg_path=${dmg_path}" >> "${GITHUB_OUTPUT}"
          echo "checksum_path=${dmg_path}.sha256" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_NAME: ${{ inputs.release_name }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
          DMG_PATH: ${{ steps.package.outputs.dmg_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
        run: |
          set -euo pipefail

          title="${RELEASE_NAME:-$TAG_NAME}"
          create_args=(
            "$TAG_NAME"
            "$DMG_PATH"
            "$CHECKSUM_PATH"
            --title "$title"
            --notes "Manual DMG build for $TAG_NAME."
            --target "$GITHUB_SHA"
          )

          if [[ "$DRAFT" == "true" ]]; then
            create_args+=(--draft)
          fi

          if [[ "$PRERELEASE" == "true" ]]; then
            create_args+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$DMG_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "${create_args[@]}"
          fi
